<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection | Averon Elements</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container navbar">
        <a class="brand" href="/index.html">Averon Elements</a>
        <nav class="nav-links">
          <a href="/index.html">Home</a>
          <a href="/collection.html">Collection</a>
          <a href="/beautify.html">Beautify</a>
          <a href="/contact.html">Contact Us</a>
          <a id="loginLink" class="auth-button" href="/login.html">Login</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="page-title">
        <h1>Collection</h1>
        <p>Premium ornament catalog with secure cart and checkout flow.</p>
      </section>

      <section class="split section">
        <div>
          <div id="productGrid" class="grid"></div>
        </div>
        <aside class="card cart-box">
          <h2>Cart <span id="cartCount">0</span></h2>
          <div id="cartItems"></div>
          <hr />
          <p><strong>Total:</strong> <span id="cartTotal">$0.00</span></p>
          <button id="checkoutButton" class="button primary" type="button">Proceed to Checkout</button>
          <div id="status" class="message"></div>
        </aside>
      </section>
    </main>

    <footer>
      <div class="container">Averon Elements | info@averonelements.com</div>
    </footer>
    <script src="/js/main.js"></script>
    <script src="/js/collection.js"></script>
  </body>
</html>
